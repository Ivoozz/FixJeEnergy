name: "FixJeEnergy"
version: "1.2.0"
slug: "fixjeenergy"
description: "Professional energy management for home batteries with internal dashboard."
url: "https://github.com/Ivoozz/FixJeEnergy"
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: "services"
boot: "auto"
init: false
hassio_api: true
hassio_role: manager
ingress: true
ingress_port: 8000
panel_icon: "mdi:battery-charging"
panel_title: "FixJeEnergy"
options:
  meteoserver_api: ""
  soc_sensor_entity: "sensor.battery_soc"
  solar_power_entities: []
  battery_control_entity: ""
  strategy: "0_on_the_meter"
  test_mode: true
  run_internal_simulation: false
schema:
  meteoserver_api: "str"
  soc_sensor_entity: "str"
  solar_power_entities:
    - "str?"
  battery_control_entity: "str"
  strategy: "list(0_on_the_meter|maximum_profit)"
  test_mode: "bool"
  run_internal_simulation: "bool"
